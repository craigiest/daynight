<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day and Night World Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; }
    #wrapper { position: relative; width: 100%; height: 100vh; height: 100dvh; overflow: hidden; }

    #map { display: block; width: 100%; height: 100%; cursor: grab; overflow: visible; touch-action: none; }
    #map:active { cursor: grabbing; }

    /* ── Projection bar ── */
    #proj-bar {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 5px;
      background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 8px;
      backdrop-filter: blur(4px);
    }
    #proj-bar button {
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 5px;
      background: transparent; color: rgba(255,255,255,0.65);
      font-size: 12px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    #proj-bar button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #proj-bar button.active {
      background: rgba(255,186,0,0.2); border-color: #ffba00; color: #ffba00;
    }

    /* ── Version stamp ── */
    #version-stamp {
      position: absolute; top: 8px; left: 10px; z-index: 10;
      font-size: 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: rgba(255,255,255,0.35); pointer-events: none;
    }

    /* ── Move Sun / Move Map segmented control (top-right) ── */
    #follow-bar {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      display: flex; gap: 0;
      background: rgba(0,0,0,0.55); padding: 4px; border-radius: 8px;
      backdrop-filter: blur(4px);
    }
    .seg {
      padding: 5px 14px;
      border: none; background: transparent;
      color: rgba(255,255,255,0.42);
      font-size: 12px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer; border-radius: 5px; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .seg:hover:not(.active) { color: rgba(255,255,255,0.65); }
    .seg.active { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.9); }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.55); padding: 8px 16px; border-radius: 8px;
      backdrop-filter: blur(4px);
    }
    /* Row wrappers are invisible on desktop — children flow into the parent flex */
    #bottom-row1, #bottom-row2 { display: contents; }
    /* Order works for both desktop (flat siblings) and mobile (within each row) */
    #now-btn                              { order: 1; }
    #bottom-row2 > .slider-stack:first-child { order: 2; }  /* date slider */
    #bottom-row1 > .step-btns            { order: 3; }
    #time-label                           { order: 4; }
    #bottom-row2 > .slider-stack:last-child  { order: 5; }  /* time slider */
    #play-btn                             { order: 6; }
    #play-btn, #now-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px; color: rgba(255,255,255,0.8);
      cursor: pointer; padding: 4px 10px; font-size: 13px; flex-shrink: 0;
    }
    #play-btn:hover, #now-btn:hover { background: rgba(255,255,255,0.1); }

    .slider-stack { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .slider-with-steps { display: flex; align-items: center; gap: 4px; }
    .step-btns { display: flex; flex-direction: column; gap: 2px; }
    .step-btns button {
      background: transparent; border: 1px solid rgba(255,255,255,0.25);
      border-radius: 3px; color: rgba(255,255,255,0.65);
      cursor: pointer; padding: 1px 5px; font-size: 9px; line-height: 1.4;
    }
    .step-btns button:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }
    .slider-caption {
      font-size: 9px; color: rgba(255,255,255,0.35);
      font-family: -apple-system, sans-serif; text-transform: uppercase;
      letter-spacing: 0.5px; user-select: none;
    }
    input[type=range] { accent-color: #ffba00; cursor: pointer; }
    #date-slider { width: 130px; }
    #time-slider { width: 130px; }

    /* Editable time label */
    #time-label {
      font-size: 12px; color: rgba(255,255,255,0.85);
      font-family: "Courier New", monospace;
      min-width: 162px; text-align: center;
      outline: none;
      border-bottom: 1px solid transparent;
      padding: 2px 5px; border-radius: 3px;
      cursor: text; white-space: nowrap;
      transition: border-color 0.15s, background 0.15s;
    }
    #time-label:hover  { border-bottom-color: rgba(255,186,0,0.4); }
    #time-label:focus  { border-bottom-color: #ffba00; background: rgba(255,186,0,0.08); color: #fff; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed; display: none; pointer-events: none; z-index: 100;
      background: rgba(255,255,255,0.88); color: #222;
      padding: 4px 9px; border-radius: 4px;
      font-size: 12px; font-family: -apple-system, sans-serif;
    }

    /* ── Mobile layout ── */
    @media (max-width: 640px) {
      #version-stamp { display: none; }

      #proj-bar {
        left: 8px; right: 8px; transform: none;
        flex-wrap: wrap; justify-content: center;
      }
      #proj-bar button {
        font-size: 0; padding: 7px 12px;
      }
      #proj-bar button::before {
        font-size: 13px; content: attr(data-short);
      }

      #follow-bar {
        top: 58px; right: 8px;
      }
      .seg { padding: 6px 12px; }

      #bottom-bar {
        left: 8px; right: 8px; transform: none;
        flex-direction: column; align-items: center; gap: 6px;
      }
      #bottom-row1 { display: flex; align-items: center; gap: 8px; }
      #bottom-row2 { display: flex; align-items: flex-start; gap: 6px; }
      #date-slider { width: 38vw; }
      #time-slider { width: 38vw; }
      #time-label  { min-width: 120px; font-size: 11px; }
      #play-btn, #now-btn { padding: 6px 12px; font-size: 14px; }
      .step-btns button { padding: 3px 8px; font-size: 11px; }
    }

    /* ── SVG layer styles ── */
    .sphere   { fill: #2a3a4d; }
    .grat     { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 0.5; }
    .country  { fill: #47c78a; stroke: #354050; stroke-width: 0.4; cursor: pointer; }
    .country:hover { fill: #62d99b; }
    .night      { fill: rgba(0,0,18,0.38); pointer-events: none; }
    .lat-equator { fill: none; stroke: rgba(255,255,255,0.35); stroke-width: 0.75; pointer-events: none; }
    .lat-tropic  { fill: none; stroke: hsl(43, 80%, 38%);  stroke-width: 0.8; pointer-events: none; stroke-dasharray: 5,4; }
    .lat-arctic  { fill: none; stroke: hsl(205, 65%, 40%); stroke-width: 1.0; pointer-events: none; stroke-dasharray: 3,4; }
  </style>
</head>
<body>

<div id="wrapper">
  <div id="proj-bar">
    <button data-proj="mercator" data-short="Mercator">Mercator</button>
    <button class="active" data-proj="globe" data-short="Globe">Orthographic</button>
    <button data-proj="north" data-short="North Pole">Azimuthal Equidistant (North Pole)</button>
    <button data-proj="south" data-short="South Pole">Azimuthal Equidistant (South Pole)</button>
  </div>
  <div id="version-stamp">v.2026-03-22 01:09 UTC</div>

  <svg id="map"></svg>

  <div id="follow-bar">
    <button class="seg"        data-mode="sun">Move Sun</button>
    <button class="seg active" data-mode="map">Move Map</button>
  </div>

  <div id="bottom-bar">
    <div id="bottom-row1">
      <button id="now-btn">Now</button>
      <div class="step-btns">
        <button id="date-up">▲</button>
        <button id="date-down">▼</button>
      </div>
      <span id="time-label" contenteditable="true" spellcheck="false"></span>
      <button id="play-btn">&#9654;</button>
    </div>
    <div id="bottom-row2">
      <div class="slider-stack">
        <input type="range" id="date-slider" min="1" max="365">
        <span class="slider-caption">Date</span>
      </div>
      <div class="slider-stack">
        <input type="range" id="time-slider" min="0" max="1439">
        <span class="slider-caption">Time of Day</span>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
// ── Country name lookup (ISO 3166-1 numeric → name) ───────────────────────────
var CN = {"4":"Afghanistan","8":"Albania","12":"Algeria","24":"Angola","28":"Antigua and Barbuda","32":"Argentina","36":"Australia","40":"Austria","50":"Bangladesh","56":"Belgium","64":"Bhutan","68":"Bolivia","70":"Bosnia and Herzegovina","72":"Botswana","76":"Brazil","84":"Belize","90":"Solomon Islands","96":"Brunei","100":"Bulgaria","104":"Myanmar","108":"Burundi","116":"Cambodia","120":"Cameroon","124":"Canada","140":"Central African Republic","144":"Sri Lanka","152":"Chile","156":"China","170":"Colombia","174":"Comoros","178":"Republic of the Congo","180":"DR Congo","188":"Costa Rica","191":"Croatia","192":"Cuba","196":"Cyprus","203":"Czech Republic","204":"Benin","208":"Denmark","214":"Dominican Republic","218":"Ecuador","818":"Egypt","222":"El Salvador","232":"Eritrea","233":"Estonia","231":"Ethiopia","242":"Fiji","246":"Finland","250":"France","266":"Gabon","270":"Gambia","276":"Germany","288":"Ghana","300":"Greece","320":"Guatemala","324":"Guinea","328":"Guyana","332":"Haiti","340":"Honduras","348":"Hungary","356":"India","360":"Indonesia","364":"Iran","368":"Iraq","372":"Ireland","376":"Israel","380":"Italy","388":"Jamaica","392":"Japan","400":"Jordan","398":"Kazakhstan","404":"Kenya","408":"North Korea","410":"South Korea","414":"Kuwait","417":"Kyrgyzstan","418":"Laos","422":"Lebanon","430":"Liberia","434":"Libya","440":"Lithuania","442":"Luxembourg","450":"Madagascar","454":"Malawi","458":"Malaysia","466":"Mali","484":"Mexico","496":"Mongolia","504":"Morocco","508":"Mozambique","516":"Namibia","524":"Nepal","528":"Netherlands","554":"New Zealand","558":"Nicaragua","562":"Niger","566":"Nigeria","578":"Norway","586":"Pakistan","591":"Panama","598":"Papua New Guinea","600":"Paraguay","604":"Peru","608":"Philippines","616":"Poland","620":"Portugal","634":"Qatar","642":"Romania","643":"Russia","646":"Rwanda","682":"Saudi Arabia","686":"Senegal","694":"Sierra Leone","703":"Slovakia","705":"Slovenia","706":"Somalia","710":"South Africa","728":"South Sudan","724":"Spain","729":"Sudan","752":"Sweden","756":"Switzerland","760":"Syria","762":"Tajikistan","764":"Thailand","768":"Togo","780":"Trinidad and Tobago","788":"Tunisia","792":"Turkey","800":"Uganda","804":"Ukraine","784":"UAE","826":"United Kingdom","840":"United States","858":"Uruguay","860":"Uzbekistan","862":"Venezuela","704":"Vietnam","887":"Yemen","894":"Zambia","716":"Zimbabwe"};

// ── Constants ──────────────────────────────────────────────────────────────────
var RAD = Math.PI / 180, DEG = 180 / Math.PI;

// ── State ─────────────────────────────────────────────────────────────────────
var W = window.innerWidth, H = window.innerHeight;
var currentProj = 'globe';
var rotation = [100, 0, 0];  // default: 100°W, equator [λ, φ, γ]
var sunOffsetLon = 0;        // longitude offset from sun in Move Map mode (degrees)
var centerOnSun = true;
var playing = false, playRaf = null, playLastTs = null;

// Per-projection zoom scales (mutable — changed by scroll wheel)
var scales = {
  globe: Math.min(W, H) * 0.47 / Math.PI,
  azed:  Math.min(W, H) * 0.47 / Math.PI
};

// Mercator state: tx/ty translation, scale — translate-based pan/zoom.
var mercState = (function() {
  var p = d3.geoMercator();
  p.fitExtent([[20,60],[W-20,H-80]], {type:'Feature',geometry:{type:'MultiPoint',
    coordinates:[[-179.9,-60],[179.9,75]]}});
  var t = p.translate();
  return { scale: p.scale(), tx: t[0], ty: t[1] };
})();

// Time state — default to Mar 21 2026 16:00 UTC
var _now = new Date();
var selectedYear = 2026;

function isLeapYear(y) { return (y%4===0 && y%100!==0) || y%400===0; }
function daysInYear(y)  { return isLeapYear(y) ? 366 : 365; }

function utcDayOfYear(ms) {
  var d = new Date(ms);
  return Math.floor((ms - Date.UTC(d.getUTCFullYear(),0,1)) / 86400000) + 1;
}

// Current time from slider values
function currentTime() {
  var day = +document.getElementById('date-slider').value;
  var min = +document.getElementById('time-slider').value;
  return Date.UTC(selectedYear, 0, 1) + (day - 1) * 86400000 + min * 60000;
}

// ── SVG setup ─────────────────────────────────────────────────────────────────
var svg = d3.select('#map').attr('width', W).attr('height', H);

// Sun-glow blur filter — large region so the circular glow is never clipped to a box
var defs = svg.append('defs');
defs.append('filter')
  .attr('id', 'sun-glow')
  .attr('x', '-200%').attr('y', '-200%')
  .attr('width', '500%').attr('height', '500%')
  .append('feGaussianBlur').attr('stdDeviation', '8');

// All geographic content lives in one group so <use> copies enable Mercator wrapping
var worldContent   = svg.append('g').attr('id','world-content');
var layerSphere    = worldContent.append('path').attr('class','sphere');
var layerGrat      = worldContent.append('path').attr('class','grat');

// Reference parallels — LineString (not polygon) avoids antimeridian/limb artifacts.
// Stop at lon 179 so D3 never closes across ±180°; the 1° gap is invisible in practice.
var PARALLELS = [
  { lat:    0,   cls: 'lat-equator' },
  { lat:  23.45, cls: 'lat-tropic'  },
  { lat: -23.45, cls: 'lat-tropic'  },
  { lat:  66.55, cls: 'lat-arctic'  },
  { lat: -66.55, cls: 'lat-arctic'  },
];

var layerCountries = worldContent.append('g');

// Lat lines go AFTER countries so they render on top of land masses too
var layerLatLines = worldContent.append('g').style('pointer-events','none');
PARALLELS.forEach(function(p) {
  var coords = d3.range(-180, 180, 1).map(function(lon) { return [lon, p.lat]; });
  layerLatLines.append('path').datum({ type:'LineString', coordinates:coords }).attr('class', p.cls);
});

var layerNight     = worldContent.append('path').attr('class','night');

// Wrapping copies — visible only in Mercator mode, offset ±worldWidth
var wcLeft  = svg.append('use').attr('href','#world-content')
                .style('pointer-events','none').style('display','none');
var wcRight = svg.append('use').attr('href','#world-content')
                .style('pointer-events','none').style('display','none');

// Sun marker appended AFTER wcLeft/wcRight so it always renders above wrapped copies
// (wrapped copies can otherwise cover the sun with their night shadow near ±180°)
var sunG = svg.append('g').style('pointer-events','none');
sunG.append('circle').attr('class','sun-halo').attr('r', 22)
    .attr('fill','#ffba00').attr('filter','url(#sun-glow)').attr('opacity', 0.55);
// Asterisk: 3 lines at 0°/60°/120°, giving 6 arms
[0, 60, 120].forEach(function(deg) {
  var a = deg * Math.PI / 180, c = Math.cos(a), s = Math.sin(a);
  sunG.append('line').attr('class','sun-mark')
      .attr('x1', -9*c).attr('y1', -9*s).attr('x2', 9*c).attr('y2', 9*s)
      .attr('stroke','#ffba00').attr('stroke-width', 1.75).attr('stroke-linecap','round');
});

var graticule = d3.geoGraticule()();

// ── Projection factory ────────────────────────────────────────────────────────
function makeProj(type) {
  switch (type) {
    case 'mercator':
      return d3.geoMercator()
        .scale(mercState.scale)
        .translate([mercState.tx, mercState.ty]);
    case 'globe':
      return d3.geoOrthographic()
        .scale(scales.globe)
        .translate([W/2, H/2])
        .rotate(rotation)
        .clipAngle(90);
    case 'north':
      return d3.geoAzimuthalEquidistant()
        .scale(scales.azed)
        .translate([W/2, H/2])
        .rotate([rotation[0], -90, 0])
        .clipAngle(179.9);
    case 'south':
      return d3.geoAzimuthalEquidistant()
        .scale(scales.azed)
        .translate([W/2, H/2])
        .rotate([rotation[0], 90, 0])
        .clipAngle(179.9);
  }
}

var proj, pathGen;

// ── Mercator vertical clamp ───────────────────────────────────────────────────
// Map spans ±π×scale in y from ty.  Keep the map edges pinned to window edges.
function clampMercTy() {
  var mercYMax = Math.PI * mercState.scale; // half-height of projected map in px
  if (2 * mercYMax <= H) {
    mercState.ty = H / 2;               // map fits window — centre it
  } else {
    // map top screen = ty − mercYMax  must be ≤ 0
    // map bot screen = ty + mercYMax  must be ≥ H
    mercState.ty = Math.min(mercYMax, Math.max(H - mercYMax, mercState.ty));
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function redraw() {
  // Apply "Move Map" (center on sun) before building projection
  if (centerOnSun) {
    var _sun = solarPosition(currentTime());
    if (currentProj === 'mercator') {
      // Center on sun + user longitude offset (offset shifts which lon is at screen center)
      mercState.tx = W/2 - mercState.scale * (_sun.longitude - sunOffsetLon) * RAD;
    } else {
      rotation[0] = -_sun.longitude + sunOffsetLon;
    }
  }

  // Clamp vertical position before building projection
  if (currentProj === 'mercator') clampMercTy();

  proj    = makeProj(currentProj);
  pathGen = d3.geoPath(proj);

  layerSphere.attr('d', pathGen({type:'Sphere'}));
  layerGrat.attr('d', pathGen(graticule));
  layerCountries.selectAll('path').attr('d', pathGen);
  layerLatLines.selectAll('path').attr('d', pathGen);

  // Update horizontal wrapping copies
  if (currentProj === 'mercator') {
    var ww = 2 * Math.PI * mercState.scale;
    wcLeft .attr('transform','translate('+(-ww)+',0)').style('display', null);
    wcRight.attr('transform','translate('+ ww +',0)').style('display', null);
  } else {
    wcLeft .style('display','none');
    wcRight.style('display','none');
  }

  drawNight();
}

// ── Night shadow + sun marker ─────────────────────────────────────────────────
function drawNight() {
  var time = currentTime();
  var sun  = solarPosition(time);
  // Normalize anti-solar longitude to [-180, 180] to avoid geoCircle artifacts
  var antiLon = sun.longitude + 180;
  if (antiLon > 180) antiLon -= 360;
  var anti = [antiLon, -sun.latitude];

  layerNight.datum(d3.geoCircle().center(anti).radius(90)()).attr('d', pathGen);

  // Sun marker — visible on globe front, dimmed warm-grey on back
  var front = isSunFront(sun.longitude, sun.latitude);
  var xy    = sunScreenXY(sun.longitude, sun.latitude);

  if (xy) {
    sunG.attr('transform','translate('+xy[0]+','+xy[1]+')')
        .style('display', null);
    var col = front ? '#ffba00' : '#c8a882';
    sunG.select('.sun-halo').attr('fill', col).attr('opacity', front ? 0.55 : 0.10);
    sunG.selectAll('.sun-mark').attr('stroke', col).attr('opacity', front ? 1 : 0.10);
  } else {
    sunG.style('display', 'none');
  }

  updateTimeLabel(time);
}

// Is the sun on the visible front hemisphere of the globe?
function isSunFront(lon, lat) {
  if (currentProj !== 'globe') return true;
  var cx = -rotation[0] * RAD, cy = -rotation[1] * RAD;
  var px = lon * RAD, py = lat * RAD;
  return Math.cos(py)*Math.cos(cy)*Math.cos(px-cx) + Math.sin(py)*Math.sin(cy) >= 0;
}

// Get screen (x,y) for the sun — returns coordinates even when behind the globe
function sunScreenXY(lon, lat) {
  if (currentProj === 'globe') {
    // Use an unclipped orthographic so back-of-globe coords are still returned
    return d3.geoOrthographic()
      .scale(scales.globe).translate([W/2, H/2]).rotate(rotation)
      .clipAngle(180)([lon, lat]);
  }
  var xy = proj([lon, lat]);
  if (xy && currentProj === 'mercator') {
    // Normalize to the nearest tile to screen centre so the sun doesn't jump
    // by a full world-width when its longitude crosses the ±180° antimeridian.
    var ww = 2 * Math.PI * mercState.scale;
    var n = Math.round((W / 2 - xy[0]) / ww);
    return [xy[0] + n * ww, xy[1]];
  }
  return xy;
}

// ── Time label (editable) ─────────────────────────────────────────────────────
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function p2(n) { return n < 10 ? '0'+n : ''+n; }

function updateTimeLabel(time) {
  if (document.activeElement === document.getElementById('time-label')) return;
  var d = new Date(time);
  document.getElementById('time-label').textContent =
    MONTHS[d.getUTCMonth()] + ' ' + p2(d.getUTCDate()) + ' ' + d.getUTCFullYear() +
    '  ' + p2(d.getUTCHours()) + ':' + p2(d.getUTCMinutes()) + ' UTC';
}

function parseAndApply(str) {
  var s = str.trim().replace(/\s*utc\s*$/i, '');
  var d = new Date(s + ' UTC');
  if (isNaN(d.getTime())) d = new Date(str);
  if (isNaN(d.getTime())) { updateTimeLabel(currentTime()); return; }

  selectedYear = d.getUTCFullYear();
  var jan1   = Date.UTC(selectedYear, 0, 1);
  var dayNum = Math.floor((d.getTime() - jan1) / 86400000) + 1;
  var minNum = d.getUTCHours() * 60 + d.getUTCMinutes();

  var ds = document.getElementById('date-slider');
  ds.max   = daysInYear(selectedYear);
  ds.value = Math.max(1, Math.min(dayNum, +ds.max));
  document.getElementById('time-slider').value = minNum;
  redraw();
}

var lbl = document.getElementById('time-label');
lbl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter')  { e.preventDefault(); this.blur(); }
  if (e.key === 'Escape') { e.preventDefault(); updateTimeLabel(currentTime()); this.blur(); }
});
lbl.addEventListener('blur', function() { parseAndApply(this.textContent); });

// ── Country data ──────────────────────────────────────────────────────────────
var tooltip = d3.select('#tooltip');

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function(world) {
  var features = topojson.feature(world, world.objects.countries).features;

  layerCountries.selectAll('path')
    .data(features).join('path')
    .attr('class','country')
    .on('mousemove', function(event, d) {
      var name = CN[String(d.id)] || '';
      if (name) {
        tooltip.style('display','block').text(name)
          .style('left',(event.clientX+12)+'px')
          .style('top', (event.clientY-22)+'px');
      }
    })
    .on('mouseleave', function() { tooltip.style('display','none'); })
    .on('click', function(event, d) {
      if (currentProj === 'mercator') return;
      var c = d3.geoCentroid(d);
      if (currentProj === 'globe') { rotation = [-c[0], -c[1], 0]; }
      else                         { rotation[0] = -c[0]; }
      redraw();
    });

  // Initialise sliders: Mar 21 2026 = day 80, 16:00 UTC = 960 min
  var ds = document.getElementById('date-slider');
  ds.max   = daysInYear(selectedYear);
  ds.value = 80;   // Mar 21
  document.getElementById('time-slider').value = 960; // 16:00 UTC

  redraw();
});

// ── Drag (pan / rotate) ───────────────────────────────────────────────────────
var drag0 = null;
var isPinching = false;
var dragSuppressUntil = 0; // suppress wheel-zoom briefly after a drag ends
svg.call(d3.drag()
  .filter(function(event) {
    // Reject drag while pinching; also reject any non-primary mouse buttons
    return !isPinching && !event.button;
  })
  .on('start', function(event) {
    if (isPinching) return;
    dragSuppressUntil = Infinity; // suppress wheel for the entire drag gesture
    drag0 = {
      x: event.x, y: event.y,
      rot: rotation.slice(),
      mTx: mercState.tx, mTy: mercState.ty,
      sunOffset: sunOffsetLon
    };
  })
  .on('drag', function(event) {
    if (!drag0 || isPinching) return;
    var dx = event.x - drag0.x, dy = event.y - drag0.y;
    if (currentProj === 'mercator') {
      if (centerOnSun) {
        // Horizontal: orbit around sun (shift viewing longitude); vertical: pan
        sunOffsetLon = drag0.sunOffset + dx * 180 / (Math.PI * mercState.scale);
        mercState.ty = drag0.mTy + dy;
      } else {
        mercState.tx = drag0.mTx + dx;
        mercState.ty = drag0.mTy + dy;
      }
    } else if (currentProj === 'globe') {
      var s = 180 / (Math.PI * scales.globe);
      if (centerOnSun) {
        // Horizontal: orbit around sun; vertical: tilt the earth
        sunOffsetLon = drag0.sunOffset + dx * s;
      } else {
        rotation[0] = drag0.rot[0] + dx * s;
      }
      rotation[1] = Math.max(-90, Math.min(90, drag0.rot[1] - dy * s));
    } else {
      // Polar az-ed
      var s = 180 / (Math.PI * scales.azed);
      if (centerOnSun) {
        sunOffsetLon = drag0.sunOffset + dx * s;
      } else {
        rotation[0] = drag0.rot[0] + dx * 360 / (Math.PI * Math.PI * scales.azed);
      }
    }
    redraw();
  })
  .on('end', function() { drag0 = null; dragSuppressUntil = performance.now() + 300; })
);

// ── Scroll to zoom ────────────────────────────────────────────────────────────
document.getElementById('map').addEventListener('wheel', function(event) {
  event.preventDefault();
  if (performance.now() < dragSuppressUntil) return; // ignore spurious scroll at drag-end
  var factor = event.deltaY < 0 ? 1.15 : 1/1.15;

  if (currentProj === 'mercator') {
    var svgRect = document.getElementById('map').getBoundingClientRect();
    var cx = event.clientX - svgRect.left;
    var cy = event.clientY - svgRect.top;
    var oldScale = mercState.scale;
    mercState.scale = Math.max(50, Math.min(oldScale * factor, W * 50));
    var ratio = mercState.scale / oldScale;
    mercState.tx = cx + (mercState.tx - cx) * ratio;
    mercState.ty = cy + (mercState.ty - cy) * ratio;
  } else if (currentProj === 'globe') {
    scales.globe = Math.max(80, Math.min(scales.globe * factor, Math.min(W,H) * 5));
  } else {
    scales.azed = Math.max(40, Math.min(scales.azed * factor, Math.min(W,H) * 5));
  }
  redraw();
}, { passive: false });

// ── Pinch / two-finger drag to zoom (mobile) ─────────────────────────────────
// Uses pointer events (same system as d3.drag) so they're always delivered.
// Tracks each active pointer by ID; when 2 are down, switches to zoom mode.
// Zoom = pinch spread/squeeze AND/OR two-finger vertical drag (up = zoom in).
var pinch0 = null;
var activePointers = new Map();
var mapEl = document.getElementById('map');

mapEl.addEventListener('pointerdown', function(event) {
  if (event.pointerType === 'mouse') return; // mouse zoom handled by wheel; skip pinch tracking
  activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
  if (activePointers.size === 2) {
    isPinching = true;
    drag0 = null;
    var pts = Array.from(activePointers.values());
    var dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
    pinch0 = {
      dist: Math.max(1, Math.sqrt(dx*dx + dy*dy)),
      midX: (pts[0].x + pts[1].x) / 2,
      midY: (pts[0].y + pts[1].y) / 2,
      globeScale: scales.globe, azedScale: scales.azed,
      mercScale: mercState.scale, mercTx: mercState.tx, mercTy: mercState.ty
    };
  }
});

mapEl.addEventListener('pointermove', function(event) {
  if (!activePointers.has(event.pointerId)) return;
  activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
  if (activePointers.size >= 2 && pinch0) {
    var pts = Array.from(activePointers.values());
    var dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
    var dist = Math.max(1, Math.sqrt(dx*dx + dy*dy));
    var midY = (pts[0].y + pts[1].y) / 2;
    // Pinch spread/squeeze + two-finger vertical drag both drive zoom
    var factor = (dist / pinch0.dist) * Math.pow(1.004, pinch0.midY - midY);
    if (currentProj === 'mercator') {
      var svgRect = mapEl.getBoundingClientRect();
      var cx = pinch0.midX - svgRect.left, cy = pinch0.midY - svgRect.top;
      var newScale = Math.max(50, Math.min(pinch0.mercScale * factor, W * 50));
      var ratio = newScale / pinch0.mercScale;
      mercState.scale = newScale;
      mercState.tx = cx + (pinch0.mercTx - cx) * ratio;
      mercState.ty = cy + (pinch0.mercTy - cy) * ratio;
    } else if (currentProj === 'globe') {
      scales.globe = Math.max(80, Math.min(pinch0.globeScale * factor, Math.min(W,H) * 5));
    } else {
      scales.azed = Math.max(40, Math.min(pinch0.azedScale * factor, Math.min(W,H) * 5));
    }
    redraw();
  }
});

// Listen on document so a pointer released outside the SVG still cleans up,
// preventing ghost entries that would falsely trigger pinch-zoom on the next drag.
['pointerup', 'pointercancel'].forEach(function(type) {
  document.addEventListener(type, function(event) {
    activePointers.delete(event.pointerId);
    if (activePointers.size < 2) { isPinching = false; pinch0 = null; }
  });
});

// iOS Safari: prevent native gesture events from stealing the pinch
mapEl.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, { passive: false });
mapEl.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });

// ── Projection buttons ────────────────────────────────────────────────────────
document.querySelectorAll('#proj-bar button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var toProj = btn.dataset.proj;
    if (toProj === currentProj) return;

    // Transition state before switching
    if (toProj === 'globe') {
      if (currentProj === 'mercator') {
        var center = proj.invert([W/2, H/2]);
        if (center) {
          rotation = [-center[0], -center[1], 0];
          var latC = Math.max(-66.5, Math.min(66.5, center[1]));
          scales.globe = mercState.scale / Math.cos(latC * RAD);
        }
      } else if (currentProj === 'north') {
        rotation[1] = -90;
        scales.globe = scales.azed;
      } else if (currentProj === 'south') {
        rotation[1] = 90;
        scales.globe = scales.azed;
      }
    }

    if (toProj === 'north' || toProj === 'south') {
      if (currentProj === 'mercator') {
        var center = proj.invert([W/2, H/2]);
        if (center) rotation[0] = -center[0];
        scales.azed = mercState.scale;
      } else if (currentProj === 'globe') {
        scales.azed = scales.globe;
      }
    }

    if (toProj === 'mercator') {
      var lon = -rotation[0];
      var lat, fromScale;
      if (currentProj === 'globe') {
        // Use globe scale directly so the equator matches the globe's equatorial scale
        fromScale = scales.globe;
        lat = Math.max(-66.5, Math.min(66.5, -rotation[1]));
      } else {
        // North/south pole: poles can't be centred in mercator — use equator.
        fromScale = scales.azed;
        lat = 0;
      }
      mercState.scale = fromScale;
      mercState.tx = W/2 - mercState.scale * lon * RAD;
      mercState.ty = H/2 + mercState.scale * Math.log(Math.tan(Math.PI/4 + lat * RAD / 2));
    }

    currentProj = toProj;
    document.querySelectorAll('#proj-bar button').forEach(function(b) {
      b.classList.toggle('active', b === btn);
    });
    redraw();
  });
});

// ── Sliders ───────────────────────────────────────────────────────────────────
document.getElementById('date-slider').addEventListener('input', function() { redraw(); });
document.getElementById('time-slider').addEventListener('input', function() { redraw(); });

document.getElementById('date-up').addEventListener('click', function() {
  var ds = document.getElementById('date-slider');
  ds.value = Math.min(+ds.value + 1, +ds.max);
  redraw();
});
document.getElementById('date-down').addEventListener('click', function() {
  var ds = document.getElementById('date-slider');
  ds.value = Math.max(+ds.value - 1, 1);
  redraw();
});

// ── Play / pause ──────────────────────────────────────────────────────────────
document.getElementById('play-btn').addEventListener('click', function() {
  playing = !playing;
  this.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  if (playing) {
    playLastTs = null;
    (function step(ts) {
      if (!playing) return;
      if (playLastTs !== null) {
        var dt   = ts - playLastTs;             // real ms elapsed
        var dMin = dt * 0.15;                   // ~150 virtual min per real second
        var ts_  = document.getElementById('time-slider');
        var ds_  = document.getElementById('date-slider');
        var min  = +ts_.value + dMin;
        var day  = +ds_.value;
        while (min >= 1440) { min -= 1440; day = day < +ds_.max ? day + 1 : 1; }
        ts_.value = min;
        ds_.value = day;
        redraw();
      }
      playLastTs = ts;
      playRaf = requestAnimationFrame(step);
    })(performance.now());
  } else {
    if (playRaf) cancelAnimationFrame(playRaf);
  }
});

// ── Now button ───────────────────────────────────────────────────────────────
document.getElementById('now-btn').addEventListener('click', function() {
  var now = new Date();
  selectedYear = now.getUTCFullYear();
  var ds = document.getElementById('date-slider');
  ds.max   = daysInYear(selectedYear);
  ds.value = utcDayOfYear(now.getTime());
  document.getElementById('time-slider').value = now.getUTCHours() * 60 + now.getUTCMinutes();
  redraw();
});

// ── Move Sun / Move Map segmented control ────────────────────────────────────
document.querySelectorAll('#follow-bar .seg').forEach(function(btn) {
  btn.addEventListener('click', function() {
    centerOnSun = this.dataset.mode === 'map';
    if (centerOnSun) {
      // Preserve the sun's current screen position instead of snapping to centre.
      // In Move Map mode the sun appears at:
      //   Mercator: x = W/2 + scale * sunOffsetLon * RAD
      //   Globe:    rotation[0] = -sun.lon + sunOffsetLon
      // Solve for sunOffsetLon that keeps the current visual position.
      var _sun = solarPosition(currentTime());
      if (currentProj === 'mercator') {
        sunOffsetLon = _sun.longitude + (mercState.tx - W/2) / (mercState.scale * RAD);
      } else {
        sunOffsetLon = rotation[0] + _sun.longitude;
      }
    }
    document.querySelectorAll('#follow-bar .seg').forEach(function(b) {
      b.classList.toggle('active', b === btn);
    });
    redraw();
  });
});

// ── Solar position (NOAA algorithm) ──────────────────────────────────────────
function solarPosition(time) {
  var centuries = (time - Date.UTC(2000,0,1,12)) / 864e5 / 36525;
  var dayMs     = time - Math.floor(time / 86400000) * 86400000;
  var lon       = (0.5 - dayMs / 86400000) * 360;
  var longitude = lon - equationOfTime(centuries) * DEG;
  var latitude  = solarDeclination(centuries) * DEG;
  longitude = ((longitude + 540) % 360) - 180;
  return { longitude: longitude, latitude: latitude };
}
function equationOfTime(c) {
  var e = eccentricityEarthOrbit(c),
      m = solarGeometricMeanAnomaly(c),
      l = solarGeometricMeanLongitude(c),
      y = Math.tan(obliquityCorrection(c)/2); y *= y;
  return y*Math.sin(2*l) - 2*e*Math.sin(m) + 4*e*y*Math.sin(m)*Math.cos(2*l)
       - 0.5*y*y*Math.sin(4*l) - 1.25*e*e*Math.sin(2*m);
}
function solarDeclination(c)       { return Math.asin(Math.sin(obliquityCorrection(c)) * Math.sin(solarApparentLongitude(c))); }
function solarApparentLongitude(c) { return solarTrueLongitude(c) - (0.00569 + 0.00478*Math.sin((125.04-1934.136*c)*RAD))*RAD; }
function solarTrueLongitude(c)     { return solarGeometricMeanLongitude(c) + solarEquationOfCenter(c); }
function solarGeometricMeanAnomaly(c)   { return (357.52911 + c*(35999.05029 - 0.0001537*c))*RAD; }
function solarGeometricMeanLongitude(c) { var l=(280.46646+c*(36000.76983+c*0.0003032))%360; return ((l<0?l+360:l)/180)*Math.PI; }
function solarEquationOfCenter(c) {
  var m = solarGeometricMeanAnomaly(c);
  return (Math.sin(m)*(1.914602-c*(0.004817+0.000014*c))
        + Math.sin(2*m)*(0.019993-0.000101*c)
        + Math.sin(3*m)*0.000289)*RAD;
}
function obliquityCorrection(c)     { return meanObliquityOfEcliptic(c) + 0.00256*Math.cos((125.04-1934.136*c)*RAD)*RAD; }
function meanObliquityOfEcliptic(c) { return (23+(26+(21.448-c*(46.815+c*(0.00059-c*0.001813)))/60)/60)*RAD; }
function eccentricityEarthOrbit(c)  { return 0.016708634 - c*(0.000042037+0.0000001267*c); }
</script>
